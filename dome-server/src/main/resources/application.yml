server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${dome.datasource.driver-class-name}
      url: jdbc:mysql://${dome.datasource.host}:${dome.datasource.port}/${dome.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${dome.datasource.username}
      password: ${dome.datasource.password}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yurirvs.dome.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      yurirvs:
        dome:
          mapper: debug
          service: info
          controller: info

dome:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
  alioss:
    endpoint: ${dome.alioss.endpoint}
    bucket-name: ${dome.alioss.bucket-name}
    access-key-id: ${dome.alioss.access-key-id}
    access-key-secret: ${dome.alioss.access-key-secret}
